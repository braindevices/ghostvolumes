name: Release

# Human-triggered only - auto-releasing every merge was rejected as
# noisy (a tag per commit) and risks a bot-commit self-trigger loop.
# See ai-work/tasks/release-workflow.plan.md.
on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - rc
          - beta
          - alpha
          - release
      execute:
        description: "Actually perform the release (unchecked = dry-run)"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags - cargo-release needs the latest tag.
          fetch-depth: 0

      - name: Require ci.yml to have passed for this commit
        # release.toml's pre-release-hook only runs `cargo build`
        # (no BTRFS on this runner) - this is the actual correctness
        # gate, checked explicitly rather than left to branch
        # protection being configured correctly out-of-band.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          result="$(gh run list --workflow ci.yml --commit "${{ github.sha }}" \
            --json status,conclusion --limit 1 \
            --jq '.[0] // {status:"missing",conclusion:"missing"} | if .status != "completed" then .status else .conclusion end')"
          if [ "$result" != "success" ]; then
            echo "::error::ci.yml has not passed for ${{ github.sha }} (result: $result) - refusing to release"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-release
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-release

      - name: Configure git identity for the release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: cargo release
        run: |
          cargo release "${{ inputs.level }}" --no-publish ${{ inputs.execute && '--execute --no-confirm' || '' }}

      - name: Create GitHub Release
        # Only for a real release (a dry run pushes no tag). Version
        # read back from Cargo.toml since cargo release already bumped
        # it. A real Release (not just a tag) is what makes GitHub
        # surface the "Source code" archive links, which - thanks to
        # .gitattributes' export-ignore - exclude ai-work/.
        if: ${{ inputs.execute }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          gh release create "v$version" --generate-notes
