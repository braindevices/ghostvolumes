name: Release

# Human-triggered only, deliberately - not on every push/merge to main.
# Auto-releasing every commit was considered and rejected: it'd create
# a persistent git tag per merge (noisy, and redundant with what
# VERGEN_GIT_DESCRIBE already gives for free per-commit with zero
# tagging), plus the self-trigger risk of a bot commit re-firing this
# same workflow. See ai-work/tasks/release-workflow.plan.md.
on:
  workflow_dispatch:
    inputs:
      level:
        description: "Version bump level"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - rc
          - beta
          - alpha
          - release
      execute:
        description: "Actually perform the release (unchecked = dry-run)"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags - cargo-release needs to see the
          # latest reachable tag to compute the next version, unlike
          # ci.yml's jobs which never need real tag data.
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-release
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-release

      - name: Configure git identity for the release commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: cargo release
        run: |
          cargo release "${{ inputs.level }}" --no-publish ${{ inputs.execute && '--execute --no-confirm' || '' }}

      - name: Create GitHub Release
        # Only on a real (non-dry-run) release - a dry run never pushes
        # a tag, so there'd be nothing to attach a Release to. The new
        # version isn't otherwise captured from `cargo release`'s own
        # output, so read it back from Cargo.toml - `cargo release`
        # already bumped and committed it by this point in the job.
        # `--generate-notes` uses GitHub's own commit-range changelog
        # (commits since the previous tag) - no separate changelog
        # mechanism needed for now. A real Release (not just a bare
        # tag) is what makes GitHub prominently attach the "Source
        # code (zip)"/"Source code (tar.gz)" download links, which -
        # thanks to .gitattributes' `export-ignore` - now exclude
        # ai-work/, unlike a plain `cargo install --git` checkout.
        if: ${{ inputs.execute }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          gh release create "v$version" --generate-notes
