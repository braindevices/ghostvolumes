# cargo-release config for .github/workflows/release.yml - human-
# triggered, main-only. See ai-work/tasks/release-workflow.plan.md.

# Only main may release.
allow-branch = ["main"]

# Not `cargo test`: the release runner has no BTRFS, so every
# BTRFS-dependent test would fail here regardless of correctness.
# `build --release` still catches a broken compile. Real correctness
# gating is main's branch protection requiring ci.yml's `test` job
# (real BTRFS) before merge - confirm that's configured, since this
# hook doesn't re-check it.
pre-release-hook = ["cargo", "build", "--release"]

pre-release-commit-message = "chore(release): v{{version}}"
